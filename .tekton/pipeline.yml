apiVersion: tekton.dev/v1beta1
kind: Pipeline
metadata:
  name: build-and-deploy-pipeline
spec:
  workspaces:
    - name: source
  params:
    - name: repo-url
      type: string
    - name: revision
      type: string
      default: "main"
    - name: IMAGE
      type: string
  tasks:
    - name: git-clone
      taskRef:
        name: git-clone
      workspaces:
        - name: output
          workspace: source
      params:
        - name: url
          value: $(params.repo-url)
        - name: revision
          value: $(params.revision)
    - name: cleanup
      taskRef:
        name: cleanup
      runAfter:
        - git-clone
      workspaces:
        - name: source
          workspace: source
    - name: nose
      taskRef:
        name: nose
      runAfter:
        - cleanup
      workspaces:
        - name: source
          workspace: source
    - name: build
      taskRef:
        name: build
      runAfter:
        - nose
      workspaces:
        - name: source
          workspace: source
      params:
        - name: IMAGE
          value: $(params.IMAGE)
